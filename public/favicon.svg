<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Premium Dark rounded background resembling high-end app icons -->
  <rect width="32" height="32" rx="9" fill="#090d16" />
  <rect width="30" height="30" x="1" y="1" rx="8" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" />
  
  <!-- Stylized dual aligned streams forming an S-curve/flow -->
  <path d="M9 11.5 C 9 9.5, 11 8, 14 8 L 18 8 C 21 8, 23 9.5, 23 11.5 C 23 13.5, 21 15, 18 15 L 14 15 C 11 15, 9 16.5, 9 18.5 C 9 20.5, 11 22, 14 22 L 18 22 C 21 22, 23 20.5, 23 18.5" 
        stroke="url(#logo-grad)" 
        stroke-width="3" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#glow)" />
        
  <!-- Alignment core indicator (shining bright node) -->
  <circle cx="16" cy="15" r="2.5" fill="#ffffff" />
</svg>
